<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Syed M Saad</title>
    <style>
        /* Modern Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Gradient matching your photo's warm lighting */
            background: radial-gradient(circle at center, #3d2b1f 0%, #000000 100%);
            color: #ffffff;
            padding: 20px;
            overflow: hidden;
        }

        /* 3D Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            /* Subtle 3D tilt */
            transform: perspective(1000px) rotateX(5deg);
            transition: transform 0.4s ease, border-color 0.4s ease;
        }

        .glass-card:hover {
            transform: perspective(1000px) rotateX(0deg) translateY(-5px);
            border-color: #f4a261;
        }

        /* Circular Profile Image */
        .profile-circle {
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
            border-radius: 50%;
            border: 4px solid #f4a261; /* Matches the orange light in your photo */
            padding: 5px;
            background: rgba(255, 255, 255, 0.05);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(244, 162, 97, 0.3);
        }

        .profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        /* Typography */
        h1 {
            font-size: 1.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, #f4a261);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            font-size: 0.8rem;
            color: #f4a261;
            letter-spacing: 2px;
            margin-bottom: 30px;
            display: block;
            text-transform: uppercase;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 20px 0;
        }

        .name {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .ceo {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
        }

        .link {
            color: #f4a261;
            text-decoration: none;
            font-weight: 500;
        }

        /* Mobile Responsive */
        @media (max-width: 400px) {
            .glass-card {
                padding: 30px 20px;
            }
            .profile-circle {
                width: 120px;
                height: 120px;
            }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <span class="status">Launching Soon</span>
        
        <div class="profile-circle">
            <img src="https://ibb.co/QRJV44L" alt="Syed M Saad">
        </div>

        <h1>Coming Soon</h1>
        
        <div class="divider"></div>

        <p class="name">Syed M Saad</p>
        <p class="ceo">Founder & CEO</p>
        <a href="https://syedmsaad.com" class="link">syed m saad .com</a>
    </div>

</body>
</html>
