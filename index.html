<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syed M Saad | Coming Soon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #2e1e12 0%, #000000 100%);
            color: white;
            padding: 20px;
            overflow: hidden;
        }

        /* Floating Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(2deg); }
            50% { transform: translateY(-15px) rotateX(-1deg); }
        }

        /* Pulsing Fiverr Active Point */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(29, 191, 115, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(29, 191, 115, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(29, 191, 115, 0); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 45px 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            animation: float 6s ease-in-out infinite;
            position: relative;
        }

        /* Fiverr Active Status */
        .fiverr-status {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(29, 191, 115, 0.15);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            color: #1dbf73; /* Fiverr Green */
            border: 1px solid rgba(29, 191, 115, 0.3);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .active-dot {
            width: 8px;
            height: 8px;
            background: #1dbf73;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 4px solid #ff9f1c; 
            padding: 5px;
            background: rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
            color: #ffffff; /* Clean White Font */
            font-weight: 900;
        }

        .query-text {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* Contact Icons Area */
        .contact-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .icon-box {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1.4rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .icon-box.whatsapp:hover { background: #25d366; border-color: #25d366; transform: scale(1.1); }
        .icon-box.tiktok:hover { background: #000000; border-color: #ff0050; transform: scale(1.1); color: #00f2ea; }

        .info-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
        }

        .name { font-size: 1.4rem; font-weight: 700; margin-bottom: 2px; }
        .role { color: #ff9f1c; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; }

        @media (max-width: 480px) {
            .glass-card { padding: 35px 20px; }
            h1 { font-size: 1.8rem; }
            .profile-pic { width: 130px; height: 130px; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="fiverr-status">
            <div class="active-dot"></div> ACTIVE NOW
        </div>

        <div class="profile-pic">
            <img src="https://i.ibb.co/5y13PPm/saad-png.png" alt="Syed M Saad">
        </div>

        <h1>COMING SOON</h1>
        <p class="query-text">Contact for any query</p>

        <div class="contact-icons">
            <a href="https://wa.me/923119482231" class="icon-box whatsapp" title="WhatsApp">
                <i class="fab fa-whatsapp"></i>
            </a>
            <a href="https://www.tiktok.com/@iamsaad18" class="icon-box tiktok" title="TikTok">
                <i class="fab fa-tiktok"></i>
            </a>
            <a href="mailto:contact@syedmsaad.com" class="icon-box" title="Email">
                <i class="far fa-envelope"></i>
            </a>
        </div>

        <div class="info-footer">
            <p class="name">Syed M Saad</p>
            <p class="role">Founder & CEO</p>
            <p style="margin-top: 10px; font-size: 0.9rem; opacity: 0.6;">syedmsaad.com</p>
        </div>
    </div>

</body>
</html>
