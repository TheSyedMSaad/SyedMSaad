<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Syed M Saad</title>
    <style>
        /* Modern Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Gradient matching your photo's warm orange and dark jacket tones */
            background: radial-gradient(circle at center, #422d1b 0%, #121212 100%);
            color: #ffffff;
            overflow-x: hidden;
            padding: 20px;
        }

        /* 3D Glass Container */
        .glass-card {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            /* 3D perspective effect */
            transform: perspective(1000px) rotateX(5deg);
            transition: transform 0.4s ease;
        }

        .glass-card:hover {
            transform: perspective(1000px) rotateX(0deg) translateY(-5px);
        }

        /* Profile Image logic - Circular and Matching Palette */
        .profile-wrapper {
            width: 160px;
            height: 160px;
            margin: 0 auto 25px;
            position: relative;
        }

        .profile-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #cc8d4c; /* Matching the warm light in your photo */
            object-fit: cover;
            box-shadow: 0 0 20px rgba(204, 141, 76, 0.4);
        }

        /* Text Content */
        h1 {
            font-size: 2rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #cc8d4c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-tag {
            display: inline-block;
            background: rgba(204, 141, 76, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #cc8d4c;
            margin-bottom: 30px;
            border: 1px solid rgba(204, 141, 76, 0.3);
        }

        .founder-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-top: 20px;
        }

        .title {
            font-size: 0.9rem;
            color: #aaaaaa;
            margin-bottom: 10px;
        }

        .domain {
            font-size: 1.1rem;
            color: #cc8d4c;
            text-decoration: none;
            font-weight: 500;
        }

        /* Mobile Responsiveness */
        @media (max-width: 480px) {
            .glass-card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.6rem;
            }
            .profile-wrapper {
                width: 130px;
                height: 130px;
            }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="status-tag">UNDER CONSTRUCTION</div>
        
        <div class="profile-wrapper">
            <img class="profile-circle" src="saad.png.png" alt="Syed M Saad">
        </div>

        <h1>COMING SOON</h1>
        
        <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
            <p class="founder-name">Syed M. Saad</p>
            <p class="title">Founder & CEO</p>
            <a href="#" class="domain">syedmsaad.com</a>
        </div>
    </div>

</body>
</html>
