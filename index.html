<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Syed M Saad</title>
    <style>
        /* Modern Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Background matches your photo's deep tones */
            background: radial-gradient(circle at center, #2e1e12 0%, #0a0a0a 100%);
            color: #ffffff;
            padding: 20px;
            overflow: hidden;
        }

        /* 3D Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
            /* Initial 3D Tilt */
            transform: perspective(1000px) rotateX(10deg);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Hover Effect */
        .glass-card:hover {
            transform: perspective(1000px) rotateX(0deg) translateY(-10px);
            border-color: #ff9f1c; /* Matches the orange light in your photo */
            box-shadow: 0 35px 70px rgba(0, 0, 0, 0.8);
        }

        /* Profile Picture Style */
        .profile-container {
            width: 160px;
            height: 160px;
            margin: 0 auto 25px;
            border-radius: 50%;
            border: 4px solid #ff9f1c; 
            padding: 5px;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 30px rgba(255, 159, 28, 0.3);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        /* Typography */
        h1 {
            font-size: 1.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, #ff9f1c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 0.8rem;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 35px;
        }

        .info-section {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
        }

        .name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .title {
            font-size: 0.9rem;
            color: #ff9f1c;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .domain {
            display: inline-block;
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            opacity: 0.8;
            transition: 0.3s;
        }

        .domain:hover {
            opacity: 1;
            color: #ff9f1c;
        }

        /* Mobile Responsive Tweaks */
        @media (max-width: 480px) {
            .glass-card {
                padding: 40px 20px;
            }
            .profile-container {
                width: 130px;
                height: 130px;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="profile-container">
            <img src="https://i.ibb.co/5y13PPm/saad-png.png" alt="Syed M Saad">
        </div>

        <h1>COMING SOON</h1>
        <p class="tagline">Innovating the Future</p>

        <div class="info-section">
            <p class="name">Syed M Saad</p>
            <p class="title">Founder & CEO</p>
            <a href="https://syedmsaad.com" class="domain">syedmsaad.com</a>
        </div>
    </div>

</body>
</html>
