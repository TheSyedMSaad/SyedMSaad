<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syed M. Saad - Coming Soon</title>
<style>
/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* Body with 3D glassy gradient background */
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff6ec4, #7873f5, #42e695);
  background-size: 600% 600%;
  animation: gradientAnimation 15s ease infinite;
  overflow: hidden;
  perspective: 1000px;
}

/* Animated gradient */
@keyframes gradientAnimation {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* Glassy card */
.glass-card {
  background: rgba(255,255,255,0.1);
  border-radius: 25px;
  padding: 50px 80px;
  backdrop-filter: blur(15px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.2);
  text-align: center;
  box-shadow: 0 0 50px rgba(0,0,0,0.2);
  transform: rotateX(10deg) rotateY(-10deg);
  transition: transform 0.5s ease;
}

/* Hover 3D tilt */
.glass-card:hover {
  transform: rotateX(0deg) rotateY(0deg) scale(1.05);
}

/* Title */
.glass-card h1 {
  font-size: 3em;
  color: #fff;
  margin-bottom: 20px;
  text-shadow: 0 0 20px rgba(255,255,255,0.6);
}

/* Subtitle */
.glass-card p {
  font-size: 1.2em;
  color: #eee;
  text-shadow: 0 0 10px rgba(255,255,255,0.3);
}

/* Countdown timer (optional) */
.countdown {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 30px;
  font-size: 1.5em;
  color: #fff;
  text-shadow: 0 0 10px rgba(0,0,0,0.4);
}

.countdown div {
  background: rgba(255,255,255,0.15);
  padding: 20px;
  border-radius: 15px;
  min-width: 70px;
  backdrop-filter: blur(10px);
}

/* Footer text */
footer {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  color: #fff;
  font-size: 0.9em;
  text-shadow: 0 0 5px rgba(0,0,0,0.4);
}
</style>
</head>
<body>

<div class="glass-card">
  <h1>SyedMSaad.com</h1>
  <p>Coming Soon 🚀</p>
  
  <div class="countdown" id="countdown">
    <div><span id="days">00</span><br>Days</div>
    <div><span id="hours">00</span><br>Hours</div>
    <div><span id="minutes">00</span><br>Minutes</div>
    <div><span id="seconds">00</span><br>Seconds</div>
  </div>
</div>

<footer>© 2026 Syed M Saad. All rights reserved.</footer>

<script>
// Countdown timer
const launchDate = new Date("2026-06-01T00:00:00").getTime();
const countdown = setInterval(() => {
  const now = new Date().getTime();
  const diff = launchDate - now;
  
  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
  const seconds = Math.floor((diff % (1000*60)) / 1000);
  
  document.getElementById("days").innerText = days.toString().padStart(2,'0');
  document.getElementById("hours").innerText = hours.toString().padStart(2,'0');
  document.getElementById("minutes").innerText = minutes.toString().padStart(2,'0');
  document.getElementById("seconds").innerText = seconds.toString().padStart(2,'0');
  
  if(diff < 0){
    clearInterval(countdown);
    document.getElementById("countdown").innerHTML = "We Are Live!";
  }
}, 1000);
</script>

</body>
</html>
