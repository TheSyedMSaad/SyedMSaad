<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syed M Saad | Coming Soon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Ultra-modern dark gradient */
            background: radial-gradient(circle at 20% 20%, #2d1b10 0%, #000000 100%);
            color: white;
            padding: 20px;
            overflow: hidden;
        }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px) rotateX(5deg); }
            50% { transform: translateY(-15px) rotateX(2deg); }
            100% { transform: translateY(0px) rotateX(5deg); }
        }

        /* Glass Card */
        .glass-box {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            animation: float 6s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        /* Profile Ring Glow */
        .profile-ring {
            width: 160px;
            height: 160px;
            margin: 0 auto 30px;
            position: relative;
            z-index: 1;
        }

        .profile-ring::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            background: linear-gradient(45deg, #ff9f1c, #ff6b35, #ff9f1c);
            border-radius: 50%;
            z-index: -1;
            filter: blur(10px);
            opacity: 0.6;
        }

        .profile-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 5px;
            background: linear-gradient(to bottom, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ceo-badge {
            display: inline-block;
            background: rgba(255, 159, 28, 0.1);
            color: #ff9f1c;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 159, 28, 0.3);
        }

        /* Social Icons */
        .socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
        }

        .socials a {
            color: white;
            font-size: 1.2rem;
            opacity: 0.5;
            transition: 0.3s;
        }

        .socials a:hover {
            opacity: 1;
            transform: scale(1.2);
            color: #ff9f1c;
        }

        /* Glass Button */
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-weight: 600;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ff9f1c;
            box-shadow: 0 0 20px rgba(255, 159, 28, 0.2);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px #00ff88;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .glass-box { padding: 40px 20px; }
            h1 { font-size: 1.8rem; }
            .profile-ring { width: 130px; height: 130px; }
        }
    </style>
</head>
<body>

    <div class="glass-box">
        <div class="profile-ring">
            <img src="https://i.ibb.co/5y13PPm/saad-png.png" alt="Syed M Saad">
        </div>

        <span class="ceo-badge"><span class="status-dot"></span>Founder & CEO</span>
        
        <h1>COMING SOON</h1>
        <p style="color: #888; margin-top: 10px;">The digital home of <b>Syed M Saad</b> is under construction.</p>

        <div class="socials">
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>

        <a href="mailto:contact@syedmsaad.com" class="btn">Get in Touch</a>
        
        <p style="margin-top: 25px; font-size: 0.9rem; font-weight: 500;">
            <a href="https://syedmsaad.com" style="color: white; text-decoration: none; opacity: 0.6;">syedmsaad.com</a>
        </p>
    </div>

</body>
</html>
