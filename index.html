<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syed M Saad | Professional Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #2e1e12 0%, #000000 100%);
            color: white;
            padding: 20px;
        }

        /* 3D Floating Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(2deg); }
            50% { transform: translateY(-15px) rotateX(-1deg); }
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(29, 191, 115, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(29, 191, 115, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(29, 191, 115, 0); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px 25px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            animation: float 6s ease-in-out infinite;
            position: relative;
        }

        /* Fiverr Style Active Point */
        .fiverr-status {
            position: absolute;
            top: 20px;
            right: 25px;
            background: rgba(29, 191, 115, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            color: #1dbf73;
            border: 1px solid rgba(29, 191, 115, 0.3);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .active-dot {
            width: 7px;
            height: 7px;
            background: #1dbf73;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .profile-pic {
            width: 140px;
            height: 140px;
            margin: 0 auto 15px;
            border-radius: 50%;
            border: 3px solid #ff9f1c; 
            padding: 5px;
            background: rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        h1 {
            font-size: 2rem;
            color: #ffffff;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .query-text {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Services Grid */
        .services-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        .service-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #ddd;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .service-item i { color: #ff9f1c; font-size: 1rem; }

        /* Social Icons */
        .contact-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .icon-link {
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .icon-link:hover { transform: scale(1.1); border-color: #ff9f1c; color: #ff9f1c; }
        .icon-link.wa:hover { background: #25d366; color: white; border-color: #25d366; }
        .icon-link.tt:hover { background: #000; color: #00f2ea; border-color: #ff0050; }

        .footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .name { font-size: 1.2rem; font-weight: 700; }
        .role { color: #ff9f1c; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; }

        @media (max-width: 480px) {
            .services-grid { grid-template-columns: 1fr; }
            .glass-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="fiverr-status">
            <div class="active-dot"></div> ACTIVE NOW
        </div>

        <div class="profile-pic">
            <img src="https://i.ibb.co/5y13PPm/saad-png.png" alt="Syed M Saad">
        </div>

        <h1>COMING SOON</h1>
        <p class="query-text">Contact for any query</p>

        <div class="services-grid">
            <div class="service-item"><i class="fas fa-code"></i> Web Dev</div>
            <div class="service-item"><i class="fas fa-mobile-alt"></i> Android App</div>
            <div class="service-item"><i class="fas fa-bullhorn"></i> Digital Marketing</div>
            <div class="service-item"><i class="fas fa-paint-brush"></i> Graphics Design</div>
        </div>

        <div class="contact-row">
            <a href="https://wa.me/923119482231" class="icon-link wa" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.tiktok.com/@iamsaad18" class="icon-link tt" title="TikTok"><i class="fab fa-tiktok"></i></a>
            <a href="mailto:contact@syedmsaad.com" class="icon-link" title="Email"><i class="far fa-envelope"></i></a>
        </div>

        <div class="footer">
            <p class="name">Syed M Saad</p>
            <p class="role">Founder & CEO</p>
            <p style="font-size: 10px; margin-top: 10px; opacity: 0.4;">SYEDMSAAD.COM</p>
        </div>
    </div>

</body>
</html>
