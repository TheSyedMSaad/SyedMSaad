<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syed M Saad | Coming Soon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Gradient palette matching your photo's warm lighting */
            background: radial-gradient(circle at center, #2e1e12 0%, #000000 100%);
            color: white;
            padding: 20px;
            overflow: hidden;
        }

        /* 3D Floating Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(2deg); }
            50% { transform: translateY(-20px) rotateX(-2deg); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            animation: float 6s ease-in-out infinite;
            perspective: 1000px;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
            border-radius: 50%;
            border: 4px solid #ff9f1c; /* Matching your photo light */
            padding: 5px;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 25px rgba(255, 159, 28, 0.3);
            overflow: hidden;
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #ff9f1c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* WhatsApp Button */
        .whatsapp-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(37, 211, 102, 0.15);
            border: 1px solid rgba(37, 211, 102, 0.4);
            color: #25d366;
            text-decoration: none;
            padding: 15px;
            border-radius: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .whatsapp-btn:hover {
            background: #25d366;
            color: white;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.4);
            transform: scale(1.02);
        }

        .info-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 25px;
            margin-top: 20px;
        }

        .name { font-size: 1.3rem; font-weight: 700; }
        .role { color: #ff9f1c; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 15px; }

        .website-link {
            color: white;
            text-decoration: none;
            opacity: 0.6;
            font-size: 1rem;
        }

        .website-link:hover { opacity: 1; color: #ff9f1c; }

        @media (max-width: 480px) {
            .glass-card { padding: 30px 20px; }
            h1 { font-size: 1.6rem; }
            .profile-pic { width: 130px; height: 130px; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="profile-pic">
            <img src="https://i.ibb.co/5y13PPm/saad-png.png" alt="Syed M Saad">
        </div>

        <h1>COMING SOON</h1>
        <p class="tagline">Innovating the Digital Space</p>

        <a href="https://wa.me/923119482231" class="whatsapp-btn" target="_blank">
            <i class="fab fa-whatsapp"></i> WhatsApp: 0311 9482231
        </a>

        <div class="info-footer">
            <p class="name">Syed M Saad</p>
            <p class="role">Founder & CEO</p>
            <a href="https://syedmsaad.com" class="website-link">syedmsaad.com</a>
        </div>
    </div>

</body>
</html>
